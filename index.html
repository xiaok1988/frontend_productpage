<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet/less" type="text/css" href="styles.less" />
    <script src="https://cdn.jsdelivr.net/npm/less"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="wrapper">
        <section class="image-section">
          <picture class="image">
            <!-- 大屏幕显示这张 -->
            <source
              srcset="images/image-product-desktop.jpg"
              media="(min-width: 800px)"
            />

            <!-- 小屏幕显示这张 -->
            <img src="images/image-product-mobile.jpg" alt="描述文字" />
          </picture>
        </section>
        <section class="text-section">
          <div class="nav">Perfume</div>
          <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
          <div class="content">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </div>
          <div class="price">
            <span class="sales-price">$149.99</span>
            <span class="original-price">$169.99</span>
          </div>
          <button class="button">
            <img src="images/icon-cart.svg" alt="" />Add to Cart
          </button>
        </section>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">程锴 </a>.
    </footer>
  </body>
</html>
